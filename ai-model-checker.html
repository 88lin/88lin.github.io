<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{appearance:none;-webkit-appearance:none;border:none;background:none;outline:none;-webkit-tap-highlight-color:transparent}
:root{
  /* === Light Theme (浅粉紫 base + 珊瑚粉 accent + 浅蓝 secondary) === */
  --bg:#F8F0F8;
  --surface:#FFFFFF;
  --surface2:#F5EEF5;
  --text:#4A4458;
  --text2:#6B6280;
  --text3:#9590A8;
  --accent:#E879A8; /* 珊瑚粉 */
  --accent2:#D4A8E8; /* 紫罗兰 secondary */
  --accent3:#8CB4E8; /* 浅蓝 */
  --r:28px;
  --rs:20px;
  --rp:999px;
  --sans:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  /* Clay shadow: 1 outset + 2 inset (same direction) - based on pink-purple tones */
  --clay:8px 8px 16px rgba(160,120,180,.2),inset -6px -6px 12px rgba(160,120,180,.15),inset 6px 6px 12px rgba(255,255,255,.7);
  --clay-sm:6px 6px 12px rgba(160,120,180,.18),inset -4px -4px 8px rgba(160,120,180,.12),inset 4px 4px 8px rgba(255,255,255,.65);
  --clay-lg:12px 12px 24px rgba(160,120,180,.25),inset -8px -8px 16px rgba(160,120,180,.18),inset 8px 8px 16px rgba(255,255,255,.75);
  --clay-in:inset 4px 4px 8px rgba(160,120,180,.15),inset -4px -4px 8px rgba(255,255,255,.6);
  --clay-btn:6px 6px 12px rgba(160,120,180,.2),inset -4px -4px 8px rgba(160,120,180,.15),inset 4px 4px 8px rgba(255,255,255,.65);
}
[data-theme="dark"]{
  /* === Dark Theme (深紫调 + 蓝色系强调色) === */
  --bg:#2D2640;
  --surface:#3A3250;
  --surface2:#443B5A;
  --text:#E8E4F0;
  --text2:#B8B0C8;
  --text3:#8A8098;
  --accent:#7AA2F7; /* 活力蓝 */
  --accent2:#9D7CD8; /* 紫罗兰 */
  --accent3:#73DACA; /* 薄荷绿 */
  --clay:8px 8px 16px rgba(20,15,35,.5),inset -6px -6px 12px rgba(20,15,35,.4),inset 6px 6px 12px rgba(80,70,100,.15);
  --clay-sm:6px 6px 12px rgba(20,15,35,.45),inset -4px -4px 8px rgba(20,15,35,.35),inset 4px 4px 8px rgba(80,70,100,.12);
  --clay-lg:12px 12px 24px rgba(20,15,35,.55),inset -8px -8px 16px rgba(20,15,35,.45),inset 8px 8px 16px rgba(80,70,100,.18);
  --clay-in:inset 4px 4px 8px rgba(20,15,35,.4),inset -4px -4px 8px rgba(80,70,100,.15);
  --clay-btn:6px 6px 12px rgba(20,15,35,.5),inset -4px -4px 8px rgba(20,15,35,.35),inset 4px 4px 8px rgba(80,70,100,.15);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  transition:background .4s,color .4s;
}
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:.4}
.orb-1{width:500px;height:500px;background:var(--accent);top:-15%;left:-10%;animation:o1 20s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:var(--accent2);bottom:-10%;right:-8%;animation:o2 25s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:var(--accent3);top:50%;left:50%;animation:o3 18s ease-in-out infinite}
[data-theme="dark"] .orb-1{background:#7AA2F7;opacity:.2}
[data-theme="dark"] .orb-2{background:#9D7CD8;opacity:.18}
[data-theme="dark"] .orb-3{background:#73DACA;opacity:.15}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-30px)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% + 30px),calc(-50% - 25px))}}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:8px}
.app{position:relative;z-index:2;max-width:800px;margin:0 auto;padding:20px 24px 20px}

/* NAVBAR */
.navbar{position:sticky;top:12px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-radius:var(--rp);box-shadow:var(--clay);transition:box-shadow .3s}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px}
.nav-logo{width:44px;height:44px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;box-shadow:var(--clay-sm)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-pill{padding:8px 14px;border-radius:var(--rp);font-size:15px;font-weight:600;color:var(--text2);letter-spacing:.3px;display:flex;align-items:center;gap:6px;box-shadow:var(--clay-sm)}
.nav-pill .dot{width:7px;height:7px;border-radius:50%;background:#73DACA;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-btn{width:44px;height:44px;border-radius:16px;background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .25s;box-shadow:var(--clay-sm)}
.theme-btn:hover{color:var(--accent);transform:translateY(-2px)}
.theme-btn:active{transform:translateY(0)}
.theme-btn .sun{display:none}.theme-btn .moon{display:block}
[data-theme="dark"] .theme-btn .sun{display:block}[data-theme="dark"] .theme-btn .moon{display:none}

/* HERO */
.hero{text-align:center;padding:48px 0 32px;animation:heroIn .5s ease-out both}
@keyframes heroIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rp);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.8px;margin-bottom:18px;box-shadow:var(--clay-sm);text-transform:uppercase}
.hero h1{font-size:clamp(32px,7vw,48px);font-weight:800;line-height:1.15;letter-spacing:-1px;margin-bottom:14px}
.hero h1 .gr{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(13px,2vw,16px);color:var(--text2);max-width:480px;margin:0 auto;line-height:1.7}

/* SECTIONS */
.section{margin-bottom:24px;opacity:0;transform:translateY(20px);animation:secIn .5s ease-out forwards}
.section:nth-child(2){animation-delay:.1s}.section:nth-child(3){animation-delay:.2s}.section:nth-child(4){animation-delay:.3s}.section:nth-child(5){animation-delay:.4s}
@keyframes secIn{to{opacity:1;transform:translateY(0)}}

/* PANEL */
.panel{background:var(--surface);border-radius:var(--r);padding:28px;transition:box-shadow .3s;box-shadow:var(--clay)}
.panel:hover{box-shadow:var(--clay-lg)}
.panel-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.panel-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:var(--clay-sm)}
.panel-icon.pink{background:var(--accent);color:#fff}
.panel-icon.green{background:var(--accent3);color:#fff}
.panel-icon.blue{background:var(--accent2);color:#fff}
.panel-icon svg{stroke-width:2}
.panel-title{font-size:16px;font-weight:700}
.panel-sub{font-size:12px;color:var(--text3);margin-top:2px}
label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:.6px;text-transform:uppercase}
.form-group{margin-bottom:18px}

/* INPUTS */
input[type="text"],input[type="password"],input[type="number"],textarea,select{width:100%;padding:14px 18px;font-size:14px;font-family:var(--sans);background:var(--surface);border:none;border-radius:var(--rs);color:var(--text);outline:none;transition:box-shadow .25s;box-shadow:var(--clay-in)}
input:focus,textarea:focus,select:focus{box-shadow:var(--clay-in),0 0 0 3px rgba(232,121,168,.25)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select{cursor:pointer;appearance:auto;-webkit-appearance:menulist}
::placeholder{color:var(--text3)}
.input-group{position:relative}.input-group input{padding-right:50px}
.ig-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:12px;background:var(--surface);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .25s;box-shadow:var(--clay-sm)}
.ig-btn:hover{color:var(--accent);transform:translateY(-50%) translateY(-2px)}
.ig-btn:active{transform:translateY(-50%)}
.copy-field-btn{right:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* RANGE */
.range-wrap{display:flex;align-items:center;gap:12px}
.range-wrap input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:8px;background:var(--surface);border:none;border-radius:8px;outline:none;padding:0;box-shadow:var(--clay-in)}
.range-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--surface);box-shadow:var(--clay-sm);transition:transform .2s}
.range-wrap input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.12)}
.range-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:38px;text-align:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;font-size:14px;font-weight:700;font-family:var(--sans);border:none;border-radius:var(--rp);cursor:pointer;transition:all .25s;min-height:48px;background:var(--surface);box-shadow:var(--clay-btn);color:var(--text)}
.btn:hover{transform:translateY(-3px);box-shadow:var(--clay)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--clay-btn)}
.btn-primary:hover{box-shadow:var(--clay);color:#fff}
.btn-primary:active{transform:translateY(2px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;box-shadow:none}
.btn-ghost:hover{box-shadow:var(--clay-sm)}
.btn-danger{background:var(--accent);color:#fff}
.btn-row{display:flex;gap:12px;flex-wrap:wrap}.btn-row .btn{flex:1;min-width:120px}
.btn-sm{padding:10px 16px;font-size:12px;min-height:40px}

/* MODE SWITCH */
.mode-switch{display:flex;background:var(--surface);border-radius:var(--rp);padding:5px;gap:5px;margin-bottom:20px;box-shadow:var(--clay-in)}
.mode-btn{flex:1;padding:12px 16px;text-align:center;font-size:13px;font-weight:700;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:var(--rp);transition:.25s;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:6px;min-height:42px}
.mode-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--clay-sm)}
.mode-btn svg{width:14px;height:14px}

/* SEARCH */
.search-box{position:relative;margin-bottom:14px}.search-box input{padding-left:44px}
.search-box .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* MODEL GRID */
.model-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-height:280px;overflow-y:auto;padding:4px}
.model-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;background:var(--surface);border-radius:var(--rs);cursor:pointer;transition:all .2s;font-size:12px;font-family:var(--mono);color:var(--text2);min-width:0;box-shadow:var(--clay-sm)}
.model-chip:hover{transform:translateY(-2px);box-shadow:var(--clay);color:var(--accent)}
.model-chip.active{color:var(--accent);box-shadow:var(--clay-in)}
.model-chip-main{display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden}
.model-chip-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.model-chip .mc-dot{width:7px;height:7px;border-radius:50%;background:#73DACA;flex-shrink:0}
.model-copy{width:30px;height:30px;flex-shrink:0;border-radius:10px;background:var(--surface);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:var(--clay-sm)}
.model-copy svg{width:12px;height:12px}
.model-copy:hover{color:var(--accent);transform:translateY(-1px)}
.model-empty{grid-column:1/-1;text-align:center;padding:28px 12px;color:var(--text3);font-size:13px;border-radius:var(--rs);box-shadow:var(--clay-in)}
.model-count{text-align:center;font-size:13px;color:var(--text3);margin-top:12px;font-weight:600}

/* OUTPUT */
.output-zone{margin-top:20px}
.output-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.output-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.output-actions{display:flex;gap:6px}
.output-box{background:var(--surface);border-radius:var(--r);padding:18px;font-family:var(--mono);font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;color:var(--text);min-height:80px;transition:box-shadow .3s;box-shadow:var(--clay-in)}
.output-box:empty::after{content:attr(data-placeholder);color:var(--text3)}
.output-box.streaming{box-shadow:var(--clay-in),0 0 0 3px rgba(232,121,168,.25)}
.cursor-blink::after{content:'▌';animation:blink .7s step-end infinite;color:var(--accent)}
@keyframes blink{50%{opacity:0}}
.raw-zone{margin-top:12px}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.stat{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rp);font-size:11px;font-weight:700;font-family:var(--mono);background:var(--surface);color:var(--text2);box-shadow:var(--clay-sm)}
.stat .sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sd-g{background:var(--accent3)}
.sd-y{background:var(--accent2)}
.sd-r{background:var(--accent)}

/* HISTORY */
.history-list{max-height:300px;overflow-y:auto}
.history-item{padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;border-radius:var(--rs);background:var(--surface);margin-bottom:10px;box-shadow:var(--clay-sm)}
.history-item:last-child{margin-bottom:0}
.history-item:hover{transform:translateY(-2px);box-shadow:var(--clay)}
.history-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.history-model{font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);background:var(--accent);padding:4px 10px;border-radius:10px}
.history-time{font-size:12px;color:var(--text3)}
.history-prompt{font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;border-radius:var(--rs);box-shadow:var(--clay-in)}

/* COLLAPSE */
.collapse-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.collapse-head .arr{color:var(--text3);transition:transform .3s;font-size:11px}
.collapse-head.open .arr{transform:rotate(180deg)}
.collapse-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.collapse-body.open{max-height:2000px}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{padding:14px 20px;border-radius:var(--rs);font-size:14px;font-weight:600;color:#fff;animation:toastIn .3s ease;box-shadow:var(--clay);pointer-events:auto}
.toast-success{background:var(--accent3)}
.toast-error{background:var(--accent)}
.toast-info{background:var(--accent2)}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{text-align:center;padding:24px 0 16px;font-size:16px;color:var(--text3);margin-top:20px}
.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:8px}
.footer-links a{color:var(--text2);text-decoration:none;font-size:16px;transition:color .2s;font-weight:500}
.footer-links a:hover{color:var(--accent)}
.footer-brand{font-weight:700;color:var(--accent)}

/* RESPONSIVE */
@media(max-width:640px){
  .app{padding:12px 16px 16px}.hero{padding:36px 0 24px}.panel{padding:20px 16px;border-radius:24px}.form-row{grid-template-columns:1fr}
  .model-grid{grid-template-columns:1fr 1fr;gap:10px}.btn-row{flex-direction:column}.btn-row .btn{min-width:0}
  .navbar{padding:12px 14px;top:8px}
  .nav-pill{padding:6px 10px;font-size:10px}.stats{gap:6px}.toast-wrap{left:16px;right:16px;bottom:16px}.toast{max-width:100%}
  .orb{opacity:.2}.output-box{font-size:12px;padding:14px}
  .hero h1{font-size:28px}
  .panel-header{gap:10px;margin-bottom:16px}.panel-icon{width:40px;height:40px;border-radius:14px}
  .btn{min-height:42px;padding:12px 18px;font-size:13px}
  .mode-btn{min-height:38px;padding:10px 12px;font-size:12px}
  input[type="text"],input[type="password"],input[type="number"],textarea{font-size:14px}
  .footer{padding:8px 0 12px;font-size:16px;margin-top:12px}
}
@media(max-width:380px){.model-grid{grid-template-columns:1fr}.nav-brand span:not(.nav-logo){display:none}}
@media supports(padding:env(safe-area-inset-bottom)){.app{padding-bottom:calc(72px + env(safe-area-inset-bottom))}.toast-wrap{bottom:calc(24px + env(safe-area-inset-bottom))}}

<script>
(function initParticles(){
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouse = {x:-999,y:-999};
  const COUNT = window.innerWidth < 640 ? 35 : 65;
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
  window.addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999});
  class P{constructor(){this.reset()}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.r=Math.random()*1.5+.5;this.alpha=Math.random()*.3+.1}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;const dx=this.x-mouse.x,dy=this.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){const f=(100-dist)/100*.5;this.x+=dx/dist*f;this.y+=dy/dist*f}}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(139,108,255,${this.alpha})`;ctx.fill()}}
  for(let i=0;i<COUNT;i++)particles.push(new P());
  function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(139,108,255,${(1-d/120)*.08})`;ctx.lineWidth=.5;ctx.stroke()}}}requestAnimationFrame(loop)}loop()
})();

let isDark=false;
function toggleTheme(){
  isDark=!isDark;
  if(isDark){
    document.documentElement.setAttribute('data-theme','dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('codex_theme',isDark?'dark':'light');
}
(function(){
  const t=localStorage.getItem('codex_theme');
  if(t==='dark'){
    isDark=true;
    document.documentElement.setAttribute('data-theme','dark');
  }
})();
// 恢复上次保存的 URL 和 API Key

})();

function togglePw(){const i=document.getElementById('apiKey');i.type=i.type==='password'?'text':'password'}
function toggleCollapse(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
function setMode(m,btn){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function toast(msg,type='info'){const c=document.getElementById('toastWrap'),el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;c.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(12px)';el.style.transition='.3s';setTimeout(()=>el.remove(),300)},3000);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function dl(name,content){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'text/plain;charset=utf-8'}));a.download=name;document.body.appendChild(a);a.click();a.remove()}
function copyText(text,msg='已复制'){navigator.clipboard.writeText(text).then(()=>toast(msg,'success')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg,'success')})}
function copyField(id,msg){const el=document.getElementById(id);if(!el||!el.value.trim()){toast('无可复制内容','error');return}copyText(el.value.trim(),msg)}

let allModels=[],selectedModel='',mode='stream',abortCtrl=null,showRaw=false,lastRaw=null;
let history=JSON.parse(localStorage.getItem('codex_h')||'[]');

async function listModels(){
  const url=document.getElementById('apiUrl').value.replace(/\/+$/,'')+'/models';
  const key=document.getElementById('apiKey').value;
  // 保存当前配置到 localStorage
  localStorage.setItem('codex_url',document.getElementById('apiUrl').value);
  localStorage.setItem('codex_key',key);
  const btn=document.getElementById('btnList');
  const grid=document.getElementById('modelGrid');
  const count=document.getElementById('modelCount');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 加载中...';
  try{
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+key}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(!d.data?.length){
      allModels=[];selectedModel='';
      grid.innerHTML='<div class="model-empty">暂无可用模型</div>';
      count.textContent='共 0 个模型';
      document.getElementById('searchWrap').style.display='none';
      document.getElementById('modelSelect').innerHTML='<option value="">-- 暂无可用模型 --</option>';
      toast('未找到模型','error');
      return;
    }
    allModels=d.data.map(m=>m.id).sort();
    renderModels(allModels);
    document.getElementById('searchWrap').style.display='block';
    const sel=document.getElementById('modelSelect');
    sel.innerHTML=allModels.map(id=>`<option value="${id}">${id}</option>`).join('');
    selectModel(allModels[0]);
    toast(`已加载 ${allModels.length} 个模型`,'success');
  }catch(e){
    allModels=[];selectedModel='';
    grid.innerHTML=`<div class="model-empty" style="color:var(--accent)">${esc(e.message)}</div>`;
    count.textContent='加载失败';
    document.getElementById('searchWrap').style.display='none';
    document.getElementById('modelSelect').innerHTML='<option value="">-- 获取失败，请重试 --</option>';
    toast('获取失败','error')
  }
  finally{btn.disabled=false;btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> 获取模型列表'}
}
function renderModels(list){
  const grid=document.getElementById('modelGrid');
  if(!list.length){
    grid.innerHTML='<div class="model-empty">没有匹配的模型</div>';
    document.getElementById('modelCount').textContent=`共 0 个模型 / ${allModels.length}`;
    return;
  }
  grid.innerHTML=list.map(id=>`<div class="model-chip ${id===selectedModel?'active':''}" data-model="${escAttr(id)}" title="${escAttr(id)}"><div class="model-chip-main"><span class="mc-dot"></span><span class="model-chip-label">${esc(id)}</span></div><button class="model-copy" type="button" data-copy="${escAttr(id)}" title="复制模型名称" aria-label="复制 ${escAttr(id)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>`).join('');
  document.getElementById('modelCount').textContent=`共 ${list.length} 个模型${list.length!==allModels.length?` / ${allModels.length}`:''}`
}
function selectModel(id){
  if(!id)return;
  selectedModel=id;
  document.getElementById('modelSelect').value=id;
  document.querySelectorAll('.model-chip').forEach(el=>el.classList.toggle('active',el.dataset.model===id));
}
function filterModels(){const kw=document.getElementById('modelSearch').value.toLowerCase().trim();renderModels(kw?allModels.filter(id=>id.toLowerCase().includes(kw)):allModels)}

async function sendTest(){
  const base=document.getElementById('apiUrl').value.replace(/\/+$/,'');
  const key=document.getElementById('apiKey').value;
  const model=document.getElementById('modelSelect').value;
  const prompt=document.getElementById('prompt').value.trim();
  const sys=document.getElementById('systemPrompt').value.trim();
  const temp=parseFloat(document.getElementById('temperature').value);
  const maxT=parseInt(document.getElementById('maxTokens').value)||2048;
  const topP=parseFloat(document.getElementById('topP').value);
  const fp=parseFloat(document.getElementById('freqPenalty').value);
  if(!model){toast('请先选择模型','error');return}
  if(!prompt){toast('请输入提示词','error');return}
  const out=document.getElementById('resultBox'),zone=document.getElementById('outputZone');
  const stats=document.getElementById('statsBar'),btnS=document.getElementById('btnSend'),btnSt=document.getElementById('btnStop');
  zone.style.display='block';stats.style.display='none';out.textContent='';out.classList.remove('cursor-blink');
  lastRaw=null;document.getElementById('rawBox').textContent='';
  const msgs=[];if(sys)msgs.push({role:'system',content:sys});msgs.push({role:'user',content:prompt});
  const body={model,messages:msgs,temperature:temp,max_tokens:maxT,top_p:topP,frequency_penalty:fp,stream:mode==='stream'};
  btnS.disabled=true;btnS.innerHTML='<span class="spinner"></span> 生成中...';
  const t0=performance.now();
  if(mode==='stream'){
    btnSt.style.display='';abortCtrl=new AbortController();
    try{
      const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify(body),signal:abortCtrl.signal});
      if(!r.ok){const t=await r.text();throw new Error(`HTTP ${r.status}: ${t}`)}
      out.classList.add('streaming','cursor-blink');
      const reader=r.body.getReader(),dec=new TextDecoder();
      let full='',buf='',chunks=0,fr='';
      while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const ln of lines){const t=ln.trim();if(!t||t==='data: [DONE]'){if(t==='data: [DONE]')fr=fr||'stop';continue}if(!t.startsWith('data: '))continue;try{const j=JSON.parse(t.slice(6));const d=j.choices?.[0]?.delta?.content;if(d){full+=d;out.textContent=full;out.scrollTop=out.scrollHeight;chunks++}if(j.choices?.[0]?.finish_reason)fr=j.choices[0].finish_reason}catch{}}}
      const el=((performance.now()-t0)/1000).toFixed(2);
      out.classList.remove('streaming','cursor-blink');
      showStats(el,full.length,chunks,fr||'stop',model);addHistory(model,prompt,full,el);
    }catch(e){out.classList.remove('streaming','cursor-blink');if(e.name==='AbortError')toast('已停止','info');else{out.textContent='Error: '+e.message;toast('请求失败','error')}}
    finally{btnS.disabled=false;btnS.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 发送测试';btnSt.style.display='none';abortCtrl=null}
  }else{
    try{
      const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){const t=await r.text();throw new Error(`HTTP ${r.status}: ${t}`)}
      const d=await r.json();lastRaw=d;const el=((performance.now()-t0)/1000).toFixed(2);
      const c=d.choices?.[0]?.message?.content||JSON.stringify(d,null,2);
      const fr=d.choices?.[0]?.finish_reason||'unknown';const u=d.usage||{};
      out.textContent=c;document.getElementById('rawBox').textContent=JSON.stringify(d,null,2);
      showStats(el,c.length,null,fr,model,u.prompt_tokens,u.completion_tokens,u.total_tokens);
      addHistory(model,prompt,c,el);
    }catch(e){out.textContent='Error: '+e.message;toast('请求失败','error')}
    finally{btnS.disabled=false;btnS.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 发送测试'}
  }
}
function stopStream(){if(abortCtrl)abortCtrl.abort()}
function showStats(el,chars,chunks,fr,model,pt,ct,tt){const bar=document.getElementById('statsBar');bar.style.display='flex';let h=`<span class="stat"><span class="sd sd-g"></span>${el}s</span><span class="stat">${chars} chars</span>`;if(chunks!=null)h+=`<span class="stat">${chunks} chunks</span>`;if(tt)h+=`<span class="stat">Tokens ${pt||'?'}+${ct||'?'}=${tt}</span>`;const dc=fr==='stop'?'sd-g':fr==='length'?'sd-y':'sd-r';h+=`<span class="stat"><span class="sd ${dc}"></span>${fr}</span>`;bar.innerHTML=h}
function copyOutput(){const t=document.getElementById('resultBox').textContent;if(!t){toast('无内容','error');return}navigator.clipboard.writeText(t).then(()=>toast('已复制','success')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已复制','success')})}
function exportResult(){const t=document.getElementById('resultBox').textContent;if(!t){toast('无内容','error');return}dl(`codex-${Date.now()}.txt`,t);toast('已导出','success')}
function toggleRaw(){showRaw=!showRaw;document.getElementById('rawZone').style.display=showRaw?'block':'none'}
function clearOutput(){document.getElementById('resultBox').textContent='';document.getElementById('rawBox').textContent='';document.getElementById('statsBar').style.display='none';document.getElementById('outputZone').style.display='none';document.getElementById('rawZone').style.display='none';showRaw=false;lastRaw=null}
function addHistory(model,prompt,response,elapsed){history.unshift({id:Date.now(),model,prompt,response,elapsed,time:new Date().toLocaleString('zh-CN')});if(history.length>50)history=history.slice(0,50);localStorage.setItem('codex_h',JSON.stringify(history));renderHistory()}
function renderHistory(){const el=document.getElementById('historyList');if(!history.length){el.innerHTML='<div class="history-empty">暂无历史记录</div>';return}el.innerHTML=history.map(h=>`<div class="history-item" onclick="loadHistory(${h.id})"><div class="history-meta"><span class="history-model">${h.model}</span><span class="history-time">${h.time} · ${h.elapsed}s</span></div><div class="history-prompt">${esc(h.prompt)}</div></div>`).join('')}
function loadHistory(id){const h=history.find(x=>x.id===id);if(!h)return;document.getElementById('prompt').value=h.prompt;if(h.model&&allModels.includes(h.model))selectModel(h.model);document.getElementById('resultBox').textContent=h.response;document.getElementById('outputZone').style.display='block';window.scrollTo({top:document.getElementById('resultBox').offsetTop-80,behavior:'smooth'});toast('已加载','info')}
function clearHistory(){if(!confirm('清空所有历史记录？'))return;history=[];localStorage.setItem('codex_h','[]');renderHistory();toast('已清空','success')}
function exportHistory(){if(!history.length){toast('无记录','error');return}dl(`codex-history-${Date.now()}.txt`,history.map(h=>`=== ${h.model} | ${h.time} | ${h.elapsed}s ===\n\n[Prompt]\n${h.prompt}\n\n[Response]\n${h.response}\n`).join('\n'+'='.repeat(60)+'\n\n'));toast('已导出','success')}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();if(!document.getElementById('btnSend').disabled)sendTest()}if(e.key==='Escape'&&abortCtrl)stopStream()});
document.getElementById('modelSelect').addEventListener('change',function(){selectModel(this.value)});
document.getElementById('modelGrid').addEventListener('click',function(e){
  const copyBtn=e.target.closest('[data-copy]');
  if(copyBtn){
    e.stopPropagation();
    copyText(copyBtn.dataset.copy,'模型名称已复制');
    return;
  }
  const chip=e.target.closest('.model-chip');
  if(!chip||!chip.dataset.model)return;
  selectModel(chip.dataset.model);
});
renderHistory();
</script>
</body>
