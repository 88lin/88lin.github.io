    <script>
        "use strict";

        // 工具函数区域 --------------------------------------------------------

        /**
         * 文本 => HTML 实体编码
         * 使用 UTF-16 code unit，输出形如 &#20320;&#22909;
         */
        const textToHTMLEntities = (text) => {
            if (!text) return "";
            let result = "";
            for (let i = 0; i < text.length; i++) {
                const code = text.charCodeAt(i);
                result += `&#${code};`;
            }
            return result;
        };

        /**
         * 验证输出格式：
         * 1. 不包含中文分号
         * 2. 不包含空格
         * 3. 完全匹配 (&#+数字;)+
         */
        const verifyFormat = (encodedText) => {
            if (!encodedText) return true;

            if (encodedText.includes("；")) return false;
            if (encodedText.includes(" ")) return false;

            const pattern = /^(&#\d+;)+$/;
            return pattern.test(encodedText);
        };

        /**
         * 统计实体数量
         */
        const countEntities = (encodedText) => {
            if (!encodedText) return 0;
            const matches = encodedText.match(/&#\d+;/g);
            return matches ? matches.length : 0;
        };

        /**
         * 显示顶部通知
         */
        const showNotification = (message, isError = false) => {
            const notification = document.getElementById("notification");
            const textEl = document.getElementById("notificationText");
            const iconEl = notification.querySelector(".notification-icon");

            textEl.textContent = message;
            notification.classList.remove("error");
            if (isError) {
                notification.classList.add("error");
                iconEl.textContent = "!";
            } else {
                iconEl.textContent = "✓";
            }

            notification.classList.add("show");

            window.clearTimeout(showNotification._timer);
            showNotification._timer = window.setTimeout(() => {
                notification.classList.remove("show");
            }, 2000);
        };

        /**
         * 更新统计显示
         */
        const updateStats = () => {
            const input = inputText.value;
            const output = outputText.value;

            inputCount.textContent = String(input.length);
            outputCount.textContent = String(output.length);
            entityCount.textContent = String(countEntities(output));
        };

        /**
         * 备用复制
         */
        const fallbackCopy = (text) => {
            try {
                const textarea = document.createElement("textarea");
                textarea.value = text;
                textarea.style.position = "fixed";
                textarea.style.top = "-9999px";
                textarea.style.opacity = "0";

                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();

                const successful = document.execCommand("copy");
                document.body.removeChild(textarea);

                if (successful) {
                    showNotification("已复制到剪贴板！");
                } else {
                    showNotification(
                        "自动复制失败，请手动选择文本复制",
                        true
                    );
                    outputText.focus();
                    outputText.select();
                    outputText.setSelectionRange(0, 99999);
                }
            } catch (err) {
                showNotification("复制失败: " + err.message, true);
                outputText.focus();
                outputText.select();
                outputText.setSelectionRange(0, 99999);
            }
        };

        // DOM 引用与事件绑定 ---------------------------------------------------

        const inputText = document.getElementById("inputText");
        const outputText = document.getElementById("outputText");

        const convertBtn = document.getElementById("convertBtn");
        const clearBtn = document.getElementById("clearBtn");
        const exampleBtn = document.getElementById("exampleBtn");
        const copyBtn = document.getElementById("copyBtn");
        const resetBtn = document.getElementById("resetBtn");

        const inputCount = document.getElementById("inputCount");
        const outputCount = document.getElementById("outputCount");
        const entityCount = document.getElementById("entityCount");
        const exampleOutput = document.getElementById("exampleOutput");

        // 转换逻辑封装
        const doConvert = () => {
            const input = inputText.value;
            if (!input.trim()) {
                showNotification("请输入文本后再转换！", true);
                return;
            }

            const converted = textToHTMLEntities(input);

            if (!verifyFormat(converted)) {
                showNotification("格式验证失败！", true);
                return;
            }

            outputText.value = converted;
            updateStats();
            showNotification("转换完成！");
        };

        // 按钮事件 ------------------------------------------------------------

        convertBtn.addEventListener("click", doConvert);

        clearBtn.addEventListener("click", () => {
            inputText.value = "";
            outputText.value = "";
            updateStats();
            showNotification("已清除所有内容！");
        });

        resetBtn.addEventListener("click", () => {
            inputText.value = "";
            outputText.value = "";
            updateStats();
            showNotification("已重置！");
        });

        copyBtn.addEventListener("click", () => {
            const output = outputText.value;
            if (!output) {
                showNotification("没有内容可复制！", true);
                return;
            }

            if (!verifyFormat(output)) {
                showNotification("格式不正确，无法复制！", true);
                return;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard
                    .writeText(output)
                    .then(() => showNotification("已复制到剪贴板！"))
                    .catch(() => fallbackCopy(output));
            } else {
                fallbackCopy(output);
            }
        });

        exampleBtn.addEventListener("click", () => {
            const examples = [
                "你好，世界！Hello & World!",
                "商品还在吗？价格多少？",
            ];

            const randomExample =
                examples[Math.floor(Math.random() * examples.length)];
            inputText.value = randomExample;

            const converted = textToHTMLEntities(randomExample);
            outputText.value = converted;
            updateStats();
            showNotification("已加载示例并自动转换！");
        });

        // 实时转换（防抖）
        let autoConvertTimer = null;
        inputText.addEventListener("input", function () {
            window.clearTimeout(autoConvertTimer);
            autoConvertTimer = window.setTimeout(() => {
                const input = this.value;
                if (input.trim()) {
                    const converted = textToHTMLEntities(input);
                    outputText.value = converted;
                } else {
                    outputText.value = "";
                }
                updateStats();
            }, 500);
        });

        // 初始化与快捷键 --------------------------------------------------------

        window.addEventListener("DOMContentLoaded", () => {
            updateStats();

            const exampleText = "你好，商品还在吗？";
            exampleOutput.textContent = textToHTMLEntities(exampleText);

            document.addEventListener("keydown", (e) => {
                const isModifier = e.ctrlKey || e.metaKey;

                if (isModifier && e.key === "Enter") {
                    e.preventDefault();
                    convertBtn.click();
                }

                if (isModifier && e.key.toLowerCase() === "k") {
                    e.preventDefault();
                    clearBtn.click();
                }

                if (
                    isModifier &&
                    e.shiftKey &&
                    e.key.toLowerCase() === "c"
                ) {
                    e.preventDefault();
                    copyBtn.click();
                }
            });
        });
    </script>
</body>
</html>
